<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-Level Cyber Year 2 Project Work</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #1a1a1a, #000);
    color: white;
    margin: 0;
}

/* Container */
.container {
    max-width: 1000px;
    margin: 40px auto;
    padding: 20px;
}

/* Header */
h1 {
    text-align: center;
    font-size: 2.5em;
    margin-bottom: 10px;
    background: linear-gradient(to right, #00f2ff, #00ff88);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle {
    text-align: center;
    opacity: 0.7;
    margin-bottom: 30px;
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

/* Cards */
.card {
    background: #111;
    border-radius: 12px;
    padding: 20px;
    text-align: centre;
    text-decoration: none;
    color: white;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

/* Glow effect */
.card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent, rgba(0,255,255,0.3), transparent);
    opacity: 0;
    transition: 0.4s;
}

.card:hover::before {
    opacity: 1;
}

.card:hover {
    transform: translateY(-5px) scale(1.02);
    box-shadow: 0 0 15px rgba(0,255,255,0.4);
}

/* Name */
.card h2 {
    margin: 0;
    font-size: 1.3em;
}

/* Status badge */
.badge {
    display: inline-block;
    margin-top: 10px;
    padding: 5px 10px;
    font-size: 0.8em;
    border-radius: 20px;
    background: #00ff88;
    color: black;
}

/* Optional different states */
.badge.in-progress {
    background: orange;
}

.badge.review {
    background: #00f2ff;
}

/* Footer */
.footer {
    text-align: center;
    margin-top: 40px;
    opacity: 0.6;
    font-size: 0.9em;
}

/* Fade in animation */
.card {
    animation: fadeIn 0.6s ease forwards;
    opacity: 0;
}

.card:nth-child(1) { animation-delay: 0.1s; }
.card:nth-child(2) { animation-delay: 0.2s; }
.card:nth-child(3) { animation-delay: 0.3s; }
.card:nth-child(4) { animation-delay: 0.4s; }
.card:nth-child(5) { animation-delay: 0.5s; }
.card:nth-child(6) { animation-delay: 0.6s; }

@keyframes fadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
    from {
        opacity: 0;
        transform: translateY(10px);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>Cyber Project Showcase</h1>
    <p class="subtitle">Year 2 T-Level Digital Support Services</p>

    <div class="grid">

        <a class="card" href="https://solomon-hackett.github.io/portfolio" target="_blank">

        </a>

        <a class="card" href="https://oskarsiljins123.github.io/Oskars-Iljins-CV/" target="_blank">

            <div class="badge in-progress">In Progress</div>
        </a>

        <a class="card" href="https://bsdc-mohammed.github.io/" target="_blank">
            <h2>Mohammed</h2>
            <div class="badge in-progress">In Progress</div>
        </a>

        <a class="card" href="https://mathews-cole.github.io/" target="_blank">
            <h2>Cole</h2>
            <div class="badge in-progress">In Progress</div>
        </a>

        <a class="card" href="https://bsdc-finlay.github.io/" target="_blank">
            <h2>Fin</h2>
            <div class="badge in-progress">In Progress</div>
        </a>

        <a class="card" href="https://bsdc-noah.github.io/" target="_blank">
            <h2>Noah</h2>
            <div class="badge in-progress">In Progress</div>
        </a>

        <a class="card" href="https://bsdc-devon.github.io/" target="_blank">
            <h2>Devon</h2>
            <div class="badge in-progress">In Progress</div>
        </a>

        <a class="card" href="https://bsdc-isa.github.io/" target="_blank">
            <h2>Isa</h2>

    </div>

    <div class="footer">

</div>

</body>
</html>
